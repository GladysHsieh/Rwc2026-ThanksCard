<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RWC 2026 義美贊助謝卡 (純淨版)</title>
    <style>
        body {
            margin: 0;
            padding: 40px 0;
            background-color: #2c0a0a; /* 網頁底色，呼應卡片 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 謝卡主體 */
        .card {
            /* 加寬邊界：將寬度從 1000px 加寬到 1200px，高度不變 */
            width: 1200px;
            height: 500px;
            
            /* 背景設定：請確保圖檔名改為 bg.jpg 並放在同一個資料夾 */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            
            position: relative;
            
            /* 保留並加粗精緻的金邊線條，增加質感 */
            border: 3px solid #d4af37;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            
            overflow: hidden;
        }

        /* 保留台北地標剪影在左側 */
        .landmarks-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 這裡使用一個假的漸層來代表地標的位置與顏色 */
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        }

        /* 右側留白區域：可在此填寫新內容 */
        .writing-area {
            position: absolute;
            top: 60px; /* 從金色邊框下方開始 */
            right: 60px; /* 留出加寬後的邊界 */
            width: 580px; /* 避開左側 101 地標 */
            height: 380px;
            padding: 40px;
            
            /* 採用楷書作為預設字體 */
            font-family: "標楷體", "DFKai-SB", "BiauKai", serif;
            color: #ffffff;
            font-size: 18px; /* 大小一致 */
            line-height: 1.8;
            text-align: justify;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); /* 增加文字可讀性 */
            
            /* 可依需手動在 div 內填寫感謝內文 */
        }
    </style>
</head>
<body>

<div class="card">
    <div class="landmarks-overlay"></div>

    <div class="writing-area">
        </div>
</div>

</body>
</html>
